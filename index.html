<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>My Blogger</title>
  <style>
    * {
      margin: 0;
      padding: 0;
      box-sizing: border-box;
    }

    body {
      font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif;
      background: #f0f2f5;
      display: flex;
      flex-direction: column;
      height: 100vh;
    }

    header {
      background: linear-gradient(135deg, #1a73e8, #0d47a1);
      color: white;
      padding: 14px 24px;
      display: flex;
      align-items: center;
      gap: 12px;
      box-shadow: 0 2px 6px rgba(0,0,0,0.3);
      z-index: 10;
    }

    header h1 {
      font-size: 1.3rem;
      font-weight: 600;
      letter-spacing: 0.5px;
    }

    header span.icon {
      font-size: 1.5rem;
    }

    .iframe-wrapper {
      flex: 1;
      display: flex;
      flex-direction: column;
    }

    iframe {
      flex: 1;
      width: 100%;
      height: 100%;
      border: none;
    }

    footer {
      background: #1a73e8;
      color: rgba(255,255,255,0.8);
      text-align: center;
      padding: 8px;
      font-size: 0.78rem;
    }

    footer a {
      color: white;
      text-decoration: none;
      font-weight: 600;
    }

    footer a:hover {
      text-decoration: underline;
    }
  </style>
</head>
<body>

  <header>
    <span class="icon">📝</span>
    <h1>My Blogger</h1>
  </header>

  <div class="iframe-wrapper">
    <iframe
      src="https://doctorh22.blogspot.com/"
      title="My Blogger Website"
      allowfullscreen
      loading="lazy"
    ></iframe>
  </div>

  <footer>
    Powered by <a href="https://doctorh22.blogspot.com/" target="_blank">doctorh22.blogspot.com</a>
  </footer>

</body>
</html>
